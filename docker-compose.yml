services:
  postgres:
    image: postgres:16-alpine
    container_name: caulong-postgres
    environment:
      POSTGRES_DB: badminton_fund
      POSTGRES_USER: badminton
      POSTGRES_PASSWORD: badminton
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U badminton -d badminton_fund"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
